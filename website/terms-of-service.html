<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terms of Service | ParentTutor</title>
    <style>
      :root {
        --text: #111827;
        --muted: #5a6476;
        --blue: #2f70c6;
        --border: #e6ebf3;
        --bg: #f5f8fd;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
      }

      .container {
        width: min(860px, 92%);
        margin: 42px auto;
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        text-decoration: none;
        color: inherit;
        margin-bottom: 10px;
      }

      .brand img {
        width: 34px;
        height: 34px;
        object-fit: contain;
      }

      h1 {
        margin: 6px 0 12px;
      }

      p {
        color: var(--muted);
      }

      a {
        color: var(--blue);
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <a class="brand" href="./index.html">
        <img src="./media/logo.png" alt="ParentTutor logo" />
        <span>ParentTutor</span>
      </a>
      <h1>Terms of Service</h1>
      <p>
        These terms should explain the rules for using ParentTutor, limitations of
        liability, and user responsibilities.
      </p>
      <p>
        Replace this placeholder text with your official terms of service before publishing.
      </p>
      <p><a href="./index.html">Back to Home</a></p>
    </main>
  </body>
</html>
